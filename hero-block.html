<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golubentseva PRO | Laser - Hero Block</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-color: #222222;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: #222222;
            background-image: url('https://p.taplink.st/p/4/4/d/f/67763910.jpg?3');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .avatar-container {
            margin-bottom: 24px;
            opacity: 0;
            /* Avatar скрыт согласно is_hide_text: true */
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .hero-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hero-description {
            font-size: 18px;
            font-weight: 400;
            color: #ffffff;
            line-height: 1.6;
            opacity: 0.95;
        }

        .cta-button {
            display: inline-block;
            margin-top: 32px;
            padding: 16px 40px;
            background-color: #4d4d4d;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 30, 30, 0.4);
            cursor: pointer;
            border: none;
        }

        .cta-button:hover {
            background-color: #646464;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 30, 30, 0.5);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }

        .delay-3 {
            animation-delay: 0.6s;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .hero {
                padding: 30px 16px;
            }

            .hero-title {
                font-size: 24px;
            }

            .hero-description {
                font-size: 16px;
            }

            .cta-button {
                padding: 14px 32px;
                font-size: 15px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 20px;
            }

            .hero-description {
                font-size: 14px;
            }

            .cta-button {
                padding: 12px 28px;
                font-size: 14px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <!-- Avatar container (скрыт согласно настройкам сайта) -->
            <div class="avatar-container">
                <img src="https://taplink.st/a/3/9/1/c/ca55d5.jpg?0" alt="Александра Голубенцева" class="avatar">
            </div>

            <!-- Заголовок -->
            <h1 class="hero-title fade-in delay-1">
                Golubentseva PRO | Laser
            </h1>

            <!-- Описание -->
            <p class="hero-description fade-in delay-2">
                Флагманский экспертный курс по лазерной эпиляции: от новичка до эксперта, которому доверяют.
            </p>

            <!-- Кнопка призыва к действию -->
            <a href="#course" class="cta-button fade-in delay-3">
                Узнать подробнее
            </a>
        </div>
    </section>

    <script>
        // Плавное появление элементов при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            const elements = document.querySelectorAll('.fade-in');
            
            // Добавляем наблюдение за появлением элементов в viewport
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px'
            };

            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                    }
                });
            }, observerOptions);

            elements.forEach(element => {
                observer.observe(element);
            });

            // Обработка клика по кнопке
            const ctaButton = document.querySelector('.cta-button');
            ctaButton.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Эффект нажатия
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);

                // Плавный скролл к секции курса (если бы она была)
                console.log('Переход к информации о курсе...');
            });

            // Параллакс эффект для фона
            const hero = document.querySelector('.hero');
            window.addEventListener('scroll', function() {
                const scrolled = window.pageYOffset;
                hero.style.backgroundPositionY = scrolled * 0.5 + 'px';
            });
        });
    </script>
</body>
</html>
