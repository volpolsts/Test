<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golubentseva PRO | Laser - Hero Block</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background-color: #0a0a0a;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a2e 100%);
            overflow: hidden;
        }

        /* Анимированный фоновый паттерн */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 50%);
            z-index: 1;
            animation: pulse 8s ease-in-out infinite;
        }

        /* Декоративные элементы */
        .hero-decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: 1;
        }

        .decoration-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -100px;
            right: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .decoration-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            bottom: -50px;
            left: -50px;
            animation: float 8s ease-in-out infinite reverse;
        }

        .decoration-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 10s ease-in-out infinite;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        /* Логотип/Бренд */
        .brand {
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
        }

        .brand-logo {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Заголовок */
        .hero-title {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 24px;
            letter-spacing: -1px;
            opacity: 0;
            transform: translateY(30px);
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-title span {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Подзаголовок */
        .hero-subtitle {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Кнопка */
        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            border: none;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.6);
        }

        .cta-button:active {
            transform: translateY(-1px) scale(0.98);
        }

        .cta-button svg {
            width: 20px;
            height: 20px;
            transition: transform 0.3s ease;
        }

        .cta-button:hover svg {
            transform: translateX(5px);
        }

        /* Дополнительные элементы */
        .hero-features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
            opacity: 0;
            transform: translateY(30px);
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .feature-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        /* Анимации */
        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(30px, -30px) rotate(120deg);
            }
            66% {
                transform: translate(-20px, 20px) rotate(240deg);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.6;
            }
        }

        /* Классы для анимации появления */
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* Адаптивность */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 20px;
            }

            .hero-title {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .cta-button {
                padding: 16px 40px;
                font-size: 15px;
            }

            .hero-features {
                gap: 20px;
                margin-top: 40px;
            }

            .feature-icon {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .feature-text {
                font-size: 12px;
            }

            .decoration-1 {
                width: 250px;
                height: 250px;
            }

            .decoration-2 {
                width: 200px;
                height: 200px;
            }

            .decoration-3 {
                width: 150px;
                height: 150px;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 28px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            .cta-button {
                padding: 14px 32px;
                font-size: 14px;
                width: 100%;
            }

            .hero-features {
                flex-wrap: wrap;
                gap: 15px;
            }

            .brand-logo {
                font-size: 12px;
                padding: 10px 24px;
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <!-- Декоративные элементы -->
        <div class="hero-decoration decoration-1"></div>
        <div class="hero-decoration decoration-2"></div>
        <div class="hero-decoration decoration-3"></div>

        <div class="hero-content">
            <!-- Бренд -->
            <div class="brand">
                <span class="brand-logo">Golubentseva PRO</span>
            </div>

            <!-- Заголовок -->
            <h1 class="hero-title">
                LASER
                <span>EXPERT COURSE</span>
            </h1>

            <!-- Подзаголовок -->
            <p class="hero-subtitle">
                Флагманский экспертный курс по лазерной эпиляции: от новичка до эксперта, 
                которому доверяют. Освойте профессию мечты за 4 недели.
            </p>

            <!-- Кнопка призыва к действию -->
            <a href="#course" class="cta-button">
                Начать обучение
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>

            <!-- Особенности -->
            <div class="hero-features">
                <div class="feature-item">
                    <div class="feature-icon">🎓</div>
                    <span class="feature-text">Сертификат</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💼</div>
                    <span class="feature-text">Практика</span>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">⭐</div>
                    <span class="feature-text">Поддержка</span>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Плавное появление элементов при загрузке
        document.addEventListener('DOMContentLoaded', function() {
            const elements = [
                { selector: '.brand', delay: 'delay-1' },
                { selector: '.hero-title', delay: 'delay-2' },
                { selector: '.hero-subtitle', delay: 'delay-3' },
                { selector: '.cta-button', delay: 'delay-4' },
                { selector: '.hero-features', delay: 'delay-4' }
            ];

            // Запуск анимаций с задержкой
            elements.forEach((item, index) => {
                const element = document.querySelector(item.selector);
                if (element) {
                    setTimeout(() => {
                        element.classList.add('fade-in-up');
                    }, index * 150);
                }
            });

            // Обработка клика по кнопке
            const ctaButton = document.querySelector('.cta-button');
            ctaButton.addEventListener('click', function(e) {
                e.preventDefault();
                
                // Эффект волны при клике
                const ripple = document.createElement('span');
                ripple.style.cssText = `
                    position: absolute;
                    background: rgba(255, 255, 255, 0.3);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: ripple 0.6s linear;
                    pointer-events: none;
                `;
                
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = e.clientX - rect.left - size/2 + 'px';
                ripple.style.top = e.clientY - rect.top - size/2 + 'px';
                
                this.appendChild(ripple);
                
                setTimeout(() => ripple.remove(), 600);

                console.log('Переход к информации о курсе...');
            });

            // Параллакс эффект для декоративных элементов
            const decorations = document.querySelectorAll('.hero-decoration');
            window.addEventListener('scroll', function() {
                const scrolled = window.pageYOffset;
                decorations.forEach((decoration, index) => {
                    const speed = (index + 1) * 0.1;
                    decoration.style.transform = `translateY(${scrolled * speed}px)`;
                });
            });

            // Добавляем анимацию для ripple эффекта
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
</html>
